services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: boooking-app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - mysql
        networks:
            - boooking-system

    nginx:
        image: nginx:alpine
        container_name: boooking-nginx
        ports:
            - "8005:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - boooking-system

    mysql:
        image: mysql:8.4
        container_name: boooking-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: booking_system_team_one
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
        ports:
            - "3301:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - boooking-system

    phpmyadmin:
        image: phpmyadmin:latest
        container_name: boooking-pma
        restart: unless-stopped
        ports:
            - "8085:80"
        environment:
            PMA_HOST: mysql
            PMA_PORT: 3306
        depends_on:
            - mysql
        networks:
            - boooking-system

volumes:
    mysql_data:

networks:
    boooking-system:
